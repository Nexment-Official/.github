name: Feature Request
description: Suggest an idea or improvement.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve Nexment.

        Please describe the problem you're trying to solve and your proposed solution.

        Not every feature request will be accepted. Decisions are made according to Nexment's long-term vision.

  - type: input
    id: project
    attributes:
      label: Project
      placeholder: e.g. Nexment CLI
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

  - type: textarea
    id: additional
    attributes:
      label: Additional Information